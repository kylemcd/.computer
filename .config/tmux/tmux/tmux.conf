# --- General -----------------------------------------------
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",ghostty:RGB"
set -g mouse on
# Allow escape sequences (OSC) to pass through to the terminal
# Required for image paste (Cmd+V) and other OSC-based features in OpenCode
set -g allow-passthrough on
# Small delay so tmux can interpret ESC+key as Alt+key
# (Ghostty sends \x1b<key> for Cmd+<key> bindings)
set -g escape-time 50
set -g history-limit 50000
set -g focus-events on

# Start windows and panes at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Always show current directory as window name, ignore program title overrides
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"
set -g allow-rename off

# --- Prefix ------------------------------------------------
# Keep default Ctrl-b prefix
set -g prefix C-b

# --- Window navigation via Cmd+N --------------------------
# Ghostty sends Alt+letter for Cmd+1..9 (letters are unambiguous)
bind -n M-j select-window -t 1
bind -n M-k select-window -t 2
bind -n M-l select-window -t 3
bind -n M-m select-window -t 4
bind -n M-n select-window -t 5
bind -n M-o select-window -t 6
bind -n M-p select-window -t 7
bind -n M-q select-window -t 8
bind -n M-r select-window -t 9

# Cmd+T -> new window (via Ghostty keybind sending M-t)
bind -n M-t new-window -c "#{pane_current_path}"

# Cmd+W -> close pane/window (via Ghostty keybind sending M-w)
bind -n M-w kill-pane

# --- Status bar --------------------------------------------
set -g status-position bottom
set -g status-style "bg=#000000,fg=#c1c1c1"
set -g status-left ""
set -g status-right ""
set -g status-justify left

# Window status
setw -g window-status-format "#[fg=#888888] #I #W "
setw -g window-status-current-format "#[fg=#5f8787,bold] #I #W "
setw -g window-status-separator ""

# --- Pane borders ------------------------------------------
set -g pane-border-style "fg=#404040"
set -g pane-active-border-style "fg=#5f8787"

# --- Splits ------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
