
# --- General -----------------------------------------------
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",ghostty:RGB"
set -g mouse on
# Allow escape sequences (OSC) to pass through to the terminal
# Required for image paste (Cmd+V) and other OSC-based features in OpenCode
set -g allow-passthrough on
# Small delay so tmux can interpret ESC+key as Alt+key
# (Ghostty sends \x1b<key> for Cmd+<key> bindings)
set -g escape-time 50
set -g history-limit 50000
set -g focus-events on

# Start windows and panes at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Window name: each pane as "folder" or "folder:process", joined by " / "
set -g automatic-rename on
set -g automatic-rename-format "#{P:#{?#{!=:#{pane_index},1}, / ,}#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{b:pane_current_path}:#{pane_current_command}}}"
set -g allow-rename off
set -g status-interval 2


# --- Prefix ------------------------------------------------
# Keep default Ctrl-b prefix
set -g prefix C-b

# --- Window navigation via Cmd+N --------------------------
# Ghostty sends Alt+letter for Cmd+1..9 (letters are unambiguous)
bind -n M-j select-window -t 1
bind -n M-k select-window -t 2
bind -n M-l select-window -t 3
bind -n M-m select-window -t 4
bind -n M-n select-window -t 5
bind -n M-o select-window -t 6
bind -n M-p select-window -t 7
bind -n M-q select-window -t 8
bind -n M-r select-window -t 9

# Cmd+T -> new window (via Ghostty keybind sending M-t)
bind -n M-t new-window -c "#{pane_current_path}"

# Cmd+W -> close pane/window, leftmost pane absorbs freed space
bind -n M-w run-shell '/bin/zsh $HOME/.computer/.config/tmux/tmux/close-pane.sh'

# --- Status bar --------------------------------------------
set -g status-position bottom
set -g status-style "bg=#091211,fg=#5cb8a2"
set -g status-left "#[bg=#091211,fg=#5cb8a2] "
set -g status-right "#[bg=#091211,fg=#5cb8a2] "
set -g status-justify left

# Window status
setw -g window-status-format "#[bg=#091211,fg=#2a5a50] #I #W "
setw -g window-status-current-format "#[bg=#091211,fg=#5cb8a2,bold] #I #W "
setw -g window-status-separator ""


# --- Pane borders ------------------------------------------
set -g pane-border-style "fg=#1a1a1a"
set -g pane-active-border-style "fg=#5cb8a2"

# --- Splits ------------------------------------------------
bind | run-shell '/bin/zsh $HOME/.computer/.config/tmux/tmux/split-pane.sh 2'
bind S run-shell '/bin/zsh $HOME/.computer/.config/tmux/tmux/split-pane.sh 2'
bind - split-window -v -c "#{pane_current_path}"

# Ctrl+Shift+W -> kill entire window (tab + all panes)
bind -n M-W kill-window

# Ctrl+Shift+2..5 -> split pane at 1/N of window width
bind -n M-B run-shell '/bin/zsh $HOME/.computer/.config/tmux/tmux/split-pane.sh 2'
bind -n M-C run-shell '/bin/zsh $HOME/.computer/.config/tmux/tmux/split-pane.sh 3'
bind -n M-D run-shell '/bin/zsh $HOME/.computer/.config/tmux/tmux/split-pane.sh 4'
bind -n M-E run-shell '/bin/zsh $HOME/.computer/.config/tmux/tmux/split-pane.sh 5'

# --- Pane navigation (vim-style) ---------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g status-left-length 100
set -g status-right-length 100
set -g message-style "bg=#091211,fg=#5cb8a2"
set -g message-command-style "bg=#091211,fg=#5cb8a2"
set -g mode-style "bg=#091211,fg=#5cb8a2"


set -g @plugin 'omerxx/tmux-floax'
set -g @floax-bind 'h'

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'
run '~/.config/tmux/plugins/tpm/tpm'

# Open tmux-floax floating pane with Ctrl+Shift+F (no prefix)
bind-key -n C-S-f run-shell '~/.config/tmux/plugins/tmux-floax/scripts/floax.sh'
