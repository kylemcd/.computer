prSections:
  - title: My Pull Requests
    filters: is:open author:@me
  - title: Needs My Review
    filters: is:open review-requested:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
notificationsSections:
  - title: All
    filters: ""
  - title: Created
    filters: reason:author
  - title: Participating
    filters: reason:participating
  - title: Mentioned
    filters: reason:mention
  - title: Review Requested
    filters: reason:review-requested
  - title: Assigned
    filters: reason:assign
  - title: Subscribed
    filters: reason:subscribed
  - title: Team Mentioned
    filters: reason:team-mention
repo:
  branchesRefetchIntervalSeconds: 30
  prsRefetchIntervalSeconds: 60
defaults:
  preview:
    open: true
    width: 0.45
  prsLimit: 20
  prApproveComment: LGTM
  issuesLimit: 20
  notificationsLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 20
      author:
        width: 15
      authorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 15
    issues:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 15
      creator:
        width: 10
      creatorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30
keybindings:
  prs:
    - key: d
      command: >
        cd {{.RepoPath}} &&
        git fetch origin {{.HeadRefName}}:refs/remotes/origin/{{.HeadRefName}} 2>/dev/null;
        critique origin/{{.BaseRefName}}...origin/{{.HeadRefName}}
repoPaths:
  anomalyco/*: ~/code/*
theme:
  ui:
    sectionsShowCount: true
    table:
      showSeparator: true
      compact: false
  colors:
    text:
      primary: "#F0F6FC"
      secondary: "#B7BDC8"
      inverted: "#151B23"
      faint: "#656C76"
      warning: "#f85149"
      success: "#3fb950"
      actor: "#B7BDC8"
    background:
      selected: "#212830"
    border:
      primary: "#3D444D"
      secondary: "#2F3742"
      faint: "#151B23"
    inline:
      icons:
        newcontributor: "#58a6ff"
        contributor: "#56d364"
        collaborator: "#e3b341"
        member: "#e3b341"
        owner: "#e3b341"
        unknownrole: "#d2a8ff"
pager:
  diff: ""
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
includeReadNotifications: true
